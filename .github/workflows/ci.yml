name: CI

on:
  push:
    branches: [master]
    paths-ignore:
      - "clients/typescript/**"
  pull_request:
    branches: [master]
    paths-ignore:
      - "clients/typescript/**"

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Run tests
        run: |
          go work init .

          while IFS= read -r dir; do
            go work use "$dir"
          done < <(find . -name go.mod \
            -not -path './examples/*' \
            -not -path './clients/go.mod' \
            -exec dirname {} \; | sort -u)

          go work sync

          go test work

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-go@v6
        with:
          go-version: "1.25"

      - name: Install golangci-lint
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@v2.11.4

      - name: Run linter
        run: golangci-lint run ./...
